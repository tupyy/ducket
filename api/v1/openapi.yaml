openapi: 3.0.3
info:
  title: Finante API
  description: Personal finance management API
  version: 1.0.0
paths:
  /transactions:
    get:
      operationId: ListTransactions
      summary: List transactions
      parameters:
        - name: filter
          in: query
          schema:
            type: string
          description: Filter DSL expression
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          description: 'Sort fields with direction (e.g., "date:desc" or "amount:asc"). Valid fields: date, amount, kind, account.'
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionList'
    post:
      operationId: CreateTransaction
      summary: Create a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
  /transactions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: GetTransaction
      summary: Get a transaction by ID
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: Transaction not found
    put:
      operationId: UpdateTransaction
      summary: Update a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '204':
          description: Transaction updated
        '404':
          description: Transaction not found
    delete:
      operationId: DeleteTransaction
      summary: Delete a transaction
      responses:
        '204':
          description: Transaction deleted
  /transactions/import:
    post:
      operationId: ImportTransactions
      summary: Import transactions from CSV or Excel files
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                account:
                  type: integer
                  format: int64
                  description: Account number to assign to CSV imports
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'
  /summary/overview:
    get:
      operationId: GetSummaryOverview
      summary: Get aggregate transaction totals
      parameters:
        - name: filter
          in: query
          schema:
            type: string
          description: Filter DSL expression
      responses:
        '200':
          description: Summary overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryOverview'
  /summary/by-tag:
    get:
      operationId: GetSummaryByTag
      summary: Get spending breakdown by tag
      parameters:
        - name: filter
          in: query
          schema:
            type: string
          description: Filter DSL expression
      responses:
        '200':
          description: Tag breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagSummary'
  /summary/balance-trend:
    get:
      operationId: GetSummaryBalanceTrend
      summary: Get monthly balance trend
      parameters:
        - name: filter
          in: query
          schema:
            type: string
          description: Filter DSL expression
      responses:
        '200':
          description: Monthly balance trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BalanceTrendPoint'
  /rules:
    get:
      operationId: ListRules
      summary: List rules
      parameters:
        - name: filter
          in: query
          schema:
            type: string
          description: Filter DSL expression
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Rule'
    post:
      operationId: CreateRule
      summary: Create a new rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Created rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
  /rules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: GetRule
      summary: Get a rule by ID
      responses:
        '200':
          description: Rule details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '404':
          description: Rule not found
    put:
      operationId: UpdateRule
      summary: Update a rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '204':
          description: Rule updated
        '404':
          description: Rule not found
    delete:
      operationId: DeleteRule
      summary: Delete a rule
      responses:
        '204':
          description: Rule deleted
components:
  schemas:
    TransactionKind:
      type: string
      enum:
        - debit
        - credit
    Transaction:
      type: object
      required:
        - id
        - hash
        - date
        - account
        - kind
        - amount
        - content
        - tags
      properties:
        id:
          type: integer
          format: int64
        hash:
          type: string
        date:
          type: string
          format: date-time
        account:
          type: integer
          format: int64
        kind:
          $ref: '#/components/schemas/TransactionKind'
        amount:
          type: number
          format: double
        content:
          type: string
        info:
          type: string
        recipient:
          type: string
        tags:
          type: array
          items:
            type: string

    TransactionList:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        total:
          type: integer
          description: Total number of matching transactions (before pagination)

    CreateTransactionRequest:
      type: object
      required:
        - kind
        - account
        - date
        - amount
        - content
      properties:
        kind:
          $ref: '#/components/schemas/TransactionKind'
        account:
          type: integer
          format: int64
        date:
          type: string
          format: date-time
        amount:
          type: number
          format: double
        content:
          type: string
        info:
          type: string
        recipient:
          type: string

    UpdateTransactionRequest:
      type: object
      required:
        - kind
        - account
        - date
        - amount
        - content
      properties:
        kind:
          $ref: '#/components/schemas/TransactionKind'
        account:
          type: integer
          format: int64
        date:
          type: string
          format: date-time
        amount:
          type: number
          format: double
        content:
          type: string
        info:
          type: string
        recipient:
          type: string

    Rule:
      type: object
      required:
        - id
        - name
        - filter
        - tags
      properties:
        id:
          type: integer
        name:
          type: string
        filter:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    CreateRuleRequest:
      type: object
      required:
        - name
        - filter
        - tags
      properties:
        name:
          type: string
        filter:
          type: string
        tags:
          type: array
          items:
            type: string

    UpdateRuleRequest:
      type: object
      required:
        - name
        - filter
        - tags
      properties:
        name:
          type: string
        filter:
          type: string
        tags:
          type: array
          items:
            type: string

    SummaryOverview:
      type: object
      required:
        - total_transactions
        - total_debit
        - total_credit
        - balance
        - unique_accounts
        - unique_tags
      properties:
        total_transactions:
          type: integer
        total_debit:
          type: number
          format: double
        total_credit:
          type: number
          format: double
        balance:
          type: number
          format: double
        unique_accounts:
          type: integer
        unique_tags:
          type: integer

    TagSummary:
      type: object
      required:
        - tag
        - total_debit
        - total_credit
        - count
      properties:
        tag:
          type: string
        total_debit:
          type: number
          format: double
        total_credit:
          type: number
          format: double
        count:
          type: integer

    BalanceTrendPoint:
      type: object
      required:
        - month
        - debit
        - credit
        - balance
      properties:
        month:
          type: string
        debit:
          type: number
          format: double
        credit:
          type: number
          format: double
        balance:
          type: number
          format: double

    ImportFileResult:
      type: object
      required:
        - filename
        - created
        - skipped
        - errors
      properties:
        filename:
          type: string
        created:
          type: integer
        skipped:
          type: integer
        errors:
          type: integer

    ImportResponse:
      type: object
      required:
        - files
        - message
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/ImportFileResult'
        message:
          type: string
