version: "3.9"
services:
  postgres:
    image: postgres:14
    container_name: finance-postgres
    networks:
      - finance
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      VERBOSE: 1
    volumes:
      - postgres-finance:/var/lib/postgresql/data
  
networks:
  finance:

volumes:
  postgres-finance:


